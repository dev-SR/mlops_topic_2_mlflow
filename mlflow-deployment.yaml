apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: kubeflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: mlflow-custom:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: MLFLOW_S3_ENDPOINT_URL
              value: 'http://minio-service.kubeflow.svc.cluster.local:9000'
            - name: BACKEND_STORE_URI
              value: 'postgresql://mlflow:mlflow_password@postgres.kubeflow.svc.cluster.local:5432/mlflow'
            - name: DEFAULT_ARTIFACT_ROOT
              value: 's3://mlflow'
          resources:
            requests:
              memory: '512Mi'
              cpu: '250m'
            limits:
              memory: '2Gi' # Increased from 512Mi
              cpu: '1000m'
          # Add readiness and liveness probes to prevent traffic to unhealthy pod
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: kubeflow
spec:
  selector:
    app: mlflow
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
